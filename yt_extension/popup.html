<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 160px; font-family: Arial, sans-serif; text-align: center; padding: 10px; }
    button { color: white; border: none; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 4px; width: 100%; font-weight: bold; }
    #startBtn { background-color: #0f9d58; }
    #startBtn:hover { background-color: #0b8043; }
    #stopBtn { background-color: #db4437; }
    #stopBtn:hover { background-color: #c53929; }
  </style>
</head>
<body>
  <h3>Live Capture</h3>
  <button id="startBtn">Start (1 FPS)</button>
  <button id="stopBtn">Stop</button>
  <script src="popup.js"></script>
</body>
</html>
